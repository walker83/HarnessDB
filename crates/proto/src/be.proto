syntax = "proto3";

package proto;

option go_package = "github.com/walker83/RorisDB/proto";

// Status represents the result of an RPC call
message Status {
    int32 code = 1;        // 0 = OK, non-zero = error
    string message = 2;
    repeated string details = 3;
}

// RowBatch represents a batch of rows
message RowBatch {
    repeated Column columns = 1;
    int32 num_rows = 2;
}

// Column represents a column of data
message Column {
    string name = 1;
    DataType data_type = 2;
    oneof data {
        BoolColumn bool_data = 3;
        Int32Column int32_data = 4;
        Int64Column int64_data = 5;
        FloatColumn float_data = 6;
        DoubleColumn double_data = 7;
        StringColumn string_data = 8;
    }
    repeated bool null_bitmap = 9;  // true if value is null
}

enum DataType {
    INVALID = 0;
    BOOLEAN = 1;
    INT8 = 2;
    INT16 = 3;
    INT32 = 4;
    INT64 = 5;
    FLOAT32 = 6;
    FLOAT64 = 7;
    STRING = 8;
    DATE = 9;
    DATETIME = 10;
}

message BoolColumn {
    repeated bool values = 1;
}

message Int32Column {
    repeated int32 values = 1;
}

message Int64Column {
    repeated int64 values = 1;
}

message FloatColumn {
    repeated float values = 1;
}

message DoubleColumn {
    repeated double values = 1;
}

message StringColumn {
    repeated bytes values = 1;
}

// BackendService is the main service exposed by Backend nodes
service BackendService {
    // Execute a plan fragment on the backend
    rpc ExecPlanFragment(ExecPlanFragmentRequest) returns (ExecPlanFragmentResponse);

    // Cancel a running plan fragment
    rpc CancelPlanFragment(CancelPlanFragmentRequest) returns (Status);

    // Fetch data from a completed fragment
    rpc FetchData(FetchDataRequest) returns (FetchDataResponse);

    // Heartbeat from FE to BE
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message ExecPlanFragmentRequest {
    string fragment_instance_id = 1;
    bytes plan = 2;           // Serialized plan fragment
    bytes desc_tbl = 3;       // Descriptor table
    QueryOptions params = 4;
}

message ExecPlanFragmentResponse {
    Status status = 1;
    string query_id = 2;
}

message CancelPlanFragmentRequest {
    string fragment_id = 1;
}

message FetchDataRequest {
    string fragment_id = 1;
    int32 max_rows = 2;
}

message FetchDataResponse {
    Status status = 1;
    RowBatch row_batch = 2;
    string query_id = 3;
}

message QueryOptions {
    int64 query_timeout = 1;
    int64 mem_limit = 2;
    string query_type = 3;
}

message HeartbeatRequest {
    int64 timestamp = 1;
}

message HeartbeatResponse {
    int64 timestamp = 1;
}
