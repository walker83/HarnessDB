[workspace]
resolver = "2"
members = [
    # Main entry point
    "roris-server",

    # Frontend (FE) - SQL parsing, query planning, catalog management
    "crates/fe-sql-parser",
    "crates/fe-catalog",
    "crates/fe-common",
    "crates/fe-datafusion",
    "crates/fe-storage",
    "crates/fe-monitor",
    "crates/mysql-protocol",

    # Backend (BE) - Storage engine, query execution
    "crates/be-storage",
    "crates/be-segment",
    "crates/be-common",
    "crates/be-rocks",

    # Shared crates
    "crates/common",
    "crates/rpc",
    "crates/types",
    "crates/proto",
    "crates/data-io",

    # Tools & utilities
    "tools/tpch_test",
    "tools/mysql_server",

    # Benchmarks
    "benches/tpch",

    # Integration tests
    "tests/integration",
]

[workspace.package]
version = "0.1.5"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/user/rovisdb"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
protobuf = "3"

# Logging & tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Networking / RPC
tonic = "0.12"
tonic-build = "0.12"
prost = "0.13"

# Data structures
hashbrown = "0.15"
indexmap = "2"
bytes = "1"
tokio-stream = { version = "0.1", features = ["fs"] }
dashmap = "6"

# HTTP server
axum = "0.7"

# Monitoring & metrics
prometheus = "0.13"

# Date/time handling
chrono = "0.4"

# SQL parsing
sqlparser = "0.53"

# Query engine
datafusion = { version = "47" }
arrow = { version = "55", default-features = false, features = ["prettyprint"] }
arrow-schema = { version = "55", default-features = false }
# Arrow sub-crates (match version that datafusion depends on)
arrow-array = { version = "55" }
arrow-buffer = { version = "55" }
arrow-data = { version = "55" }
arrow-cast = { version = "55" }
arrow-select = { version = "55" }

# Storage
rocksdb = "0.23"
lz4 = "1.28"
zstd = "0.13"
snap = "1.1"

# Indexing
roaring = "0.10"

# Cryptography
md5 = "0.7"
sha1 = "0.10"
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"

# Testing
mockall = "0.13"

# Async traits
async-trait = "0.1"

# Internal crates
fe-sql-parser = { path = "crates/fe-sql-parser" }
fe-catalog = { path = "crates/fe-catalog" }
fe-common = { path = "crates/fe-common" }
be-storage = { path = "crates/be-storage" }
be-segment = { path = "crates/be-segment" }
be-common = { path = "crates/be-common" }
be-rocks = { path = "crates/be-rocks" }
common = { path = "crates/common" }
rpc = { path = "crates/rpc" }
types = { path = "crates/types" }
proto = { path = "crates/proto" }
fe-datafusion = { path = "crates/fe-datafusion" }
fe-storage = { path = "crates/fe-storage" }
fe-monitor = { path = "crates/fe-monitor" }
mysql-protocol = { path = "crates/mysql-protocol" }
data-io = { path = "crates/data-io" }

# Parquet support
parquet = "55"
