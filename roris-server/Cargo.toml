[package]
name = "roris-server"
version.workspace = true
edition.workspace = true

[features]
default = ["parquet-storage"]
parquet-storage = ["be-storage/parquet-storage"]

[[bin]]
name = "roris-fe"
path = "src/fe_main.rs"

[[bin]]
name = "roris-be"
path = "src/be_main.rs"

[dependencies]
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
clap = { version = "4", features = ["derive"] }
serde = { workspace = true }
serde_json = { workspace = true }
axum = { workspace = true }
tonic = { workspace = true }
proto = { workspace = true }

fe-sql-parser = { workspace = true }
fe-catalog = { workspace = true }
fe-common = { workspace = true }
fe-monitor = { workspace = true }
fe-datafusion = { workspace = true }
mysql-protocol = { workspace = true }
be-storage = { workspace = true }
be-common = { workspace = true }
be-rocks = { workspace = true }
common = { workspace = true }
rpc = { workspace = true }
types = { workspace = true }
datafusion = { workspace = true }
chrono = { workspace = true }
